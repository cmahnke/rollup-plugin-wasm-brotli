name: 🐞 Bug Report
description: Report a bug or unexpected behavior in rollup-plugin-wasm-brotli
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! 🙏
        Please fill out the form below as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: 🐞 Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: "When I use the plugin with a .wasm file from a node module, it throws..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 🔁 Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Add `inlineWasm()` to rollup config
        2. Import a `.wasm` file using `new URL(...)`
        3. Run `rollup -c`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: What did you expect to happen?
      placeholder: "The .wasm file should be inlined into the bundle without errors."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
      description: What actually happened?
      placeholder: "The build fails with the following error..."
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: ⚙️ Rollup Config
      description: Please paste your `rollup.config.js` here.
      render: javascript
      placeholder: |
        import inlineWasm from 'rollup-plugin-inline-wasm';

        export default {
          input: 'src/main.js',
          output: {
            dir: 'dist',
            format: 'esm'
          },
          plugins: [inlineWasm()]
        };
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 📋 Error Logs
      description: Paste any relevant error logs here.
      render: shell
      placeholder: "[!] Error: ..."
    validations:
      required: false

  - type: input
    id: plugin-version
    attributes:
      label: 📦 Plugin Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: rollup-version
    attributes:
      label: 📦 Rollup Version
      placeholder: "e.g. 4.0.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: 🟢 Node.js Version
      placeholder: "e.g. 20.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 💻 Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 📝 Additional Context
      description: Add any other context, screenshots, or file structure here.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ Checklist
      options:
        - label: I am using the latest version of the plugin
          required: true
        - label: I have checked existing issues for duplicates
          required: true
        - label: I have included a minimal reproducible example
          required: false
